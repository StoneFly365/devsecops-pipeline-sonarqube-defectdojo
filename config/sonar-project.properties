# ──────────────────────────────────────────────────────────────────
# sonar-project.properties  –  WebGoat (proyecto de prueba)
# ──────────────────────────────────────────────────────────────────

sonar.projectKey=webgoat
sonar.projectName=WebGoat – Security Training App
sonar.projectVersion=2023.8

# Código fuente principal
sonar.sources=src/main/java
sonar.tests=src/test/java

# Lenguaje principal
sonar.language=java

# Encoding
sonar.sourceEncoding=UTF-8

# Rutas de cobertura (JaCoCo)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclusiones – no analizar recursos estáticos ni código generado
sonar.exclusions=\
  **/target/**,\
  **/*.xml,\
  **/*.html,\
  **/static/**,\
  **/*.min.js

sonar.test.exclusions=**/*Test*.java

# Quality Gate personalizado (debe llamarse igual que el que crearás)
# sonar.qualitygate.wait=true   # Falla el pipeline si no pasa el QG

# Conexión (sobreescribible con variables de entorno)
# sonar.host.url   → variable de entorno SONAR_HOST_URL
# sonar.token      → variable de entorno SONAR_TOKEN
